<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Tracker">
    <title>Daily Activity Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:active {
            background: #f5f5f5;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .date-picker-group {
            margin-bottom: 16px;
        }

        .date-picker-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }

        .date-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .date-shortcuts {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .date-shortcut {
            flex: 1;
            padding: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .date-shortcut:active {
            background: #f5f5f5;
        }

        .date-shortcut.active {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .current-date-display {
            font-size: 13px;
            color: #666;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 12px;
        }

        .energy-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .energy-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.3;
        }

        .energy-btn:active {
            transform: scale(0.95);
        }

        .energy-btn.active {
            border-color: #534AB7;
            background: #534AB7;
            color: white;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
        }

        .activity-btn {
            padding: 12px 8px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.3;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .activity-btn:active {
            transform: scale(0.95);
        }

        .activity-btn.active {
            border-color: #3B6D11;
            background: #EAF3DE;
            color: #1a1a1a;
            font-weight: 600;
        }

        .activity-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .activity-label {
            font-size: 11px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
        }

        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .activity-item-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .activity-name {
            font-weight: 600;
        }

        .activity-time {
            font-size: 11px;
            color: #999;
        }

        .activity-count {
            font-weight: 600;
            color: #534AB7;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .back-btn {
            padding: 10px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            width: 100%;
            font-weight: 500;
        }

        .back-btn:active {
            background: #f5f5f5;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .settings-item input {
            flex: 1;
            border: 1px solid #e0e0e0;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 8px;
        }

        .settings-item button {
            padding: 6px 12px;
            background: #fcebeb;
            border: 1px solid #f09595;
            color: #501313;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .settings-item button:active {
            background: #f7c1c1;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .add-btn:active {
            background: #f5f5f5;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .export-btn:active {
            background: #f5f5f5;
        }

        .danger-btn {
            background: #fcebeb;
            border-color: #f09595;
            color: #501313;
        }

        .danger-btn:active {
            background: #f7c1c1;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 12px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #ffffff;
            }
            .section, .header-btn, .add-btn, .export-btn {
                background: #2a2a2a;
                border-color: #444;
            }
            .stat-card, .settings-item, .activity-item, .current-date-display, .date-shortcut {
                background: #333;
                border-color: #444;
            }
            .date-shortcut {
                color: #fff;
            }
            .stat-label, .section-title, .info-text, .date-picker-label {
                color: #aaa;
            }
            .activity-btn {
                background: #2a2a2a;
                color: #fff;
                border-color: #444;
            }
            .activity-btn.active {
                background: #3B6D11;
                border-color: #3B6D11;
                color: #fff;
            }
            .settings-item input, .date-input {
                background: #3a3a3a;
                color: #fff;
                border-color: #444;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MAIN VIEW -->
        <div id="mainView" class="view active">
            <div class="header">
                <h1>Daily Tracker</h1>
                <button class="header-btn" onclick="showSettings()">⚙️ Settings</button>
            </div>

            <div class="section">
                <div class="section-title">Select Date</div>
                <div class="date-shortcuts">
                    <button class="date-shortcut active" onclick="setDateToday()">Today</button>
                    <button class="date-shortcut" onclick="setDateYesterday()">Yesterday</button>
                    <button class="date-shortcut" onclick="toggleCustomDate()">Custom</button>
                </div>
                <div id="customDatePicker" style="display: none;">
                    <input type="date" id="dateInput" class="date-input" onchange="setCustomDate()">
                </div>
                <div class="current-date-display" id="currentDateDisplay">Today</div>
            </div>

            <div class="section">
                <div class="section-title">How are you feeling?</div>
                <div class="energy-buttons" id="energyButtons"></div>
            </div>

            <div class="section">
                <div class="section-title">What did you do?</div>
                <div class="activity-grid" id="activityGrid"></div>
            </div>

            <div class="section">
                <div class="section-title">This Week</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Most done</div>
                        <div class="stat-value" id="topActivity">—</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Breakdown (with timestamps)</div>
                <div class="activity-list" id="activityBreakdown"></div>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settingsView" class="view">
            <button class="back-btn" onclick="showMain()">← Back</button>

            <div class="section">
                <div class="section-title">Energy Levels</div>
                <div id="energySettings"></div>
                <button class="add-btn" onclick="addEnergyLevel()">+ Add energy level</button>
            </div>

            <div class="section">
                <div class="section-title">Activities</div>
                <div id="activitySettings"></div>
                <button class="add-btn" onclick="addActivity()">+ Add activity</button>
            </div>

            <div class="section">
                <div class="section-title">Data</div>
                <button class="export-btn" onclick="exportData()">📥 Export data</button>
                <button class="export-btn danger-btn" onclick="clearAllData()">🗑️ Clear all</button>
                <div class="info-text">Data saved locally on your phone. Refresh to load changes.</div>
            </div>
        </div>
    </div>

    <script>
        const defaultConfig = {
            energyLevels: [
                { id: 'high', label: '⚡ High energy' },
                { id: 'medium', label: '🌤️ Medium energy' },
                { id: 'low', label: '🌙 Low energy' },
                { id: 'struggling', label: '💙 Struggling' }
            ],
            activities: [
                { id: 'keyboard', label: '🎹', name: 'Keyboard' },
                { id: 'sewing', label: '✂️', name: 'Sewing' },
                { id: 'garden', label: '🌱', name: 'Garden' },
                { id: 'design', label: '🎨', name: 'Design' },
                { id: 'planning', label: '📋', name: 'Planning' },
                { id: 'move', label: '🚶', name: 'Movement' },
                { id: 'rest', label: '😴', name: 'Rest' }
            ]
        };

        let config = JSON.parse(JSON.stringify(defaultConfig));
        let log = {};
        let selectedDate = new Date();

        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateDisplay(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (getDateKey(date) === getDateKey(today)) {
                return 'Today';
            } else if (getDateKey(date) === getDateKey(yesterday)) {
                return 'Yesterday';
            } else {
                return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            }
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function loadData() {
            const stored = localStorage.getItem('trackerConfig');
            if (stored) config = JSON.parse(stored);
            const logStored = localStorage.getItem('activityLog');
            if (logStored) log = JSON.parse(logStored);
        }

        function saveData() {
            localStorage.setItem('trackerConfig', JSON.stringify(config));
            localStorage.setItem('activityLog', JSON.stringify(log));
        }

        function setDateToday() {
            selectedDate = new Date();
            updateDateDisplay();
            renderMain();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function setDateYesterday() {
            selectedDate = new Date();
            selectedDate.setDate(selectedDate.getDate() - 1);
            updateDateDisplay();
            renderMain();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function toggleCustomDate() {
            const picker = document.getElementById('customDatePicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
            if (picker.style.display !== 'none') {
                document.getElementById('dateInput').value = getDateKey(selectedDate);
            }
        }

        function setCustomDate() {
            const dateString = document.getElementById('dateInput').value;
            if (dateString) {
                selectedDate = new Date(dateString + 'T00:00:00');
                updateDateDisplay();
                renderMain();
                document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
                document.getElementById('customDatePicker').style.display = 'none';
            }
        }

        function updateDateDisplay() {
            document.getElementById('currentDateDisplay').textContent = formatDateDisplay(selectedDate);
        }

        function renderMain() {
            renderEnergyButtons();
            renderActivityGrid();
            renderStats();
        }

        function renderEnergyButtons() {
            const container = document.getElementById('energyButtons');
            container.innerHTML = '';
            const dateKey = getDateKey(selectedDate);
            
            config.energyLevels.forEach(level => {
                const btn = document.createElement('button');
                btn.className = 'energy-btn';
                if (log[dateKey]?.energy === level.id) {
                    btn.classList.add('active');
                }
                btn.textContent = level.label;
                btn.onclick = () => setEnergy(level.id);
                container.appendChild(btn);
            });
        }

        function setEnergy(id) {
            const dateKey = getDateKey(selectedDate);
            if (!log[dateKey]) log[dateKey] = { energy: '', activities: [] };
            log[dateKey].energy = id;
            saveData();
            renderEnergyButtons();
        }

        function renderActivityGrid() {
            const container = document.getElementById('activityGrid');
            container.innerHTML = '';
            const dateKey = getDateKey(selectedDate);
            const dateActivities = log[dateKey]?.activities || [];

            config.activities.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'activity-btn';
                const isActive = dateActivities.some(a => a.id === act.id);
                if (isActive) {
                    btn.classList.add('active');
                }
                btn.innerHTML = `<div class="activity-icon">${act.label}</div><div class="activity-label">${act.name}</div>`;
                btn.onclick = () => toggleActivity(act.id);
                container.appendChild(btn);
            });
        }

        function toggleActivity(id) {
            const dateKey = getDateKey(selectedDate);
            if (!log[dateKey]) log[dateKey] = { energy: '', activities: [] };
            
            const idx = log[dateKey].activities.findIndex(a => a.id === id);
            if (idx === -1) {
                log[dateKey].activities.push({ id, timestamp: new Date() });
            } else {
                log[dateKey].activities.splice(idx, 1);
            }
            saveData();
            renderActivityGrid();
            renderStats();
        }

        function renderStats() {
            let total = 0;
            const counts = {};

            Object.values(log).forEach(day => {
                if (day.activities) {
                    day.activities.forEach(act => {
                        total++;
                        counts[act.id] = (counts[act.id] || 0) + 1;
                    });
                }
            });

            document.getElementById('totalCount').textContent = total;

            const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
            if (top) {
                const act = config.activities.find(a => a.id === top[0]);
                document.getElementById('topActivity').textContent = act ? act.label : '—';
            }

            const breakdown = document.getElementById('activityBreakdown');
            breakdown.innerHTML = '';
            
            let allActivities = [];
            Object.values(log).forEach(day => {
                if (day.activities) {
                    day.activities.forEach(act => {
                        allActivities.push(act);
                    });
                }
            });

            allActivities.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            allActivities.forEach(activity => {
                const act = config.activities.find(a => a.id === activity.id);
                if (act) {
                    const item = document.createElement('div');
                    item.className = 'activity-item';
                    const time = activity.timestamp ? formatTime(new Date(activity.timestamp)) : '—';
                    item.innerHTML = `
                        <div class="activity-item-left">
                            <span class="activity-name">${act.label} ${act.name}</span>
                            <span class="activity-time">${time}</span>
                        </div>
                        <span class="activity-count">${counts[activity.id] || 1}</span>
                    `;
                    breakdown.appendChild(item);
                }
            });
        }

        function showSettings() {
            document.getElementById('mainView').classList.remove('active');
            document.getElementById('settingsView').classList.add('active');
            renderSettings();
        }

        function showMain() {
            document.getElementById('settingsView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
        }

        function renderSettings() {
            const energyContainer = document.getElementById('energySettings');
            energyContainer.innerHTML = '';
            config.energyLevels.forEach((level, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${level.label}" onchange="config.energyLevels[${idx}].label = this.value; saveData();">
                    <button onclick="config.energyLevels.splice(${idx}, 1); saveData(); renderSettings(); renderMain();">Remove</button>
                `;
                energyContainer.appendChild(item);
            });

            const actContainer = document.getElementById('activitySettings');
            actContainer.innerHTML = '';
            config.activities.forEach((act, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${act.label} ${act.name}" onchange="const parts = this.value.split(' '); config.activities[${idx}].label = parts[0]; config.activities[${idx}].name = parts.slice(1).join(' '); saveData();">
                    <button onclick="config.activities.splice(${idx}, 1); saveData(); renderSettings(); renderMain();">Remove</button>
                `;
                actContainer.appendChild(item);
            });
        }

        function addEnergyLevel() {
            const name = prompt('Energy level (e.g., "😊 Energized"):');
            if (name) {
                config.energyLevels.push({
                    id: 'custom_' + Date.now(),
                    label: name
                });
                saveData();
                renderSettings();
                renderMain();
            }
        }

        function addActivity() {
            const input = prompt('Activity (e.g., "🎸 Guitar"):');
            if (input) {
                const parts = input.split(' ');
                config.activities.push({
                    id: 'custom_' + Date.now(),
                    label: parts[0],
                    name: parts.slice(1).join(' ') || 'Activity'
                });
                saveData();
                renderSettings();
                renderMain();
            }
        }

        function exportData() {
            const backup = { config, log, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tracker_backup.json';
            a.click();
        }

        function clearAllData() {
            if (confirm('Delete ALL data? Cannot undo.')) {
                log = {};
                config = JSON.parse(JSON.stringify(defaultConfig));
                saveData();
                renderMain();
                showMain();
            }
        }

        loadData();
        updateDateDisplay();
        renderMain();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.oninstall=()=>self.skipWaiting();self.onactivate=()=>clients.claim();');
        }
    </script>
</body>
</html>
