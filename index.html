<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Tracker">
    <title>Daily Activity Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-buttons {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:active {
            background: #f5f5f5;
        }

        .header-btn.active {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .date-picker-group {
            margin-bottom: 12px;
        }

        .date-shortcuts {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .date-shortcut {
            flex: 1;
            padding: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .date-shortcut:active {
            background: #f5f5f5;
        }

        .date-shortcut.active {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .date-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .current-date-display {
            font-size: 13px;
            color: #666;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            text-align: center;
        }

        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .time-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .time-input-label {
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }

        .time-input {
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
        }

        .log-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .log-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .energy-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .energy-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .energy-btn:active {
            transform: scale(0.95);
        }

        .energy-btn.active {
            border-color: #534AB7;
            background: #534AB7;
            color: white;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 8px;
        }

        .activity-btn {
            padding: 10px 6px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .activity-btn:active {
            transform: scale(0.95);
        }

        .activity-btn.active {
            border-color: #3B6D11;
            background: #EAF3DE;
            color: #1a1a1a;
            font-weight: 600;
        }

        .activity-icon {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .activity-label {
            font-size: 10px;
        }

        .log-button {
            width: 100%;
            padding: 12px;
            background: #534AB7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .log-button:active {
            background: #3d3178;
        }

        .log-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .month-view {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
        }

        .day-card-date {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .day-entries {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entry {
            background: white;
            border-left: 3px solid #534AB7;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .entry-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .entry-activity {
            font-weight: 600;
        }

        .entry-time {
            font-size: 10px;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
        }

        .entry-duration {
            font-size: 10px;
            color: #666;
            font-weight: 500;
        }

        .entry-energy {
            font-size: 10px;
            color: #999;
        }

        .hours-breakdown {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hours-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .hours-label {
            font-weight: 600;
        }

        .hours-value {
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            color: #534AB7;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .analysis-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
        }

        .analysis-title {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .analysis-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .analysis-item:last-child {
            border-bottom: none;
        }

        .analysis-label {
            font-weight: 500;
        }

        .analysis-value {
            color: #534AB7;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 13px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .back-btn {
            padding: 10px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            width: 100%;
            font-weight: 500;
        }

        .back-btn:active {
            background: #f5f5f5;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .settings-item input {
            flex: 1;
            border: 1px solid #e0e0e0;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 8px;
        }

        .settings-item button {
            padding: 6px 12px;
            background: #fcebeb;
            border: 1px solid #f09595;
            color: #501313;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .settings-item button:active {
            background: #f7c1c1;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .add-btn:active {
            background: #f5f5f5;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .export-btn:active {
            background: #f5f5f5;
        }

        .danger-btn {
            background: #fcebeb;
            border-color: #f09595;
            color: #501313;
        }

        .danger-btn:active {
            background: #f7c1c1;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-btn:active {
            background: #f5f5f5;
        }

        .modal-btn.primary {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .delete-btn {
            background: #fcebeb;
            border: 0.5px solid #f09595;
            color: #501313;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .month-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .month-nav {
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: #534AB7;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #ffffff;
            }
            .section, .header-btn, .add-btn, .export-btn, .modal-content, .day-card, .entry, .log-section, .month-selector, .analysis-card {
                background: #2a2a2a;
                border-color: #444;
            }
            .settings-item, .modal-btn, .current-date-display, .date-shortcut, .hours-item {
                background: #333;
                border-color: #444;
            }
            .date-shortcut, .modal-btn {
                color: #fff;
            }
            .section-title, .info-text, .log-label, .time-input-label, .analysis-title {
                color: #aaa;
            }
            .activity-btn {
                background: #2a2a2a;
                color: #fff;
                border-color: #444;
            }
            .activity-btn.active {
                background: #3B6D11;
                border-color: #3B6D11;
                color: #fff;
            }
            .settings-item input, .date-input, .modal-input, .time-input {
                background: #3a3a3a;
                color: #fff;
                border-color: #444;
            }
            .empty-state {
                color: #666;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MAIN VIEW -->
        <div id="mainView" class="view active">
            <div class="header">
                <h1>Daily Tracker</h1>
                <div class="header-buttons">
                    <button class="header-btn active" onclick="switchTab('log')">Log</button>
                    <button class="header-btn" onclick="switchTab('month')">Month</button>
                    <button class="header-btn" onclick="switchTab('analysis')">Analysis</button>
                    <button class="header-btn" onclick="showSettings()">⚙️</button>
                </div>
            </div>

            <!-- LOG TAB -->
            <div id="logTab" class="view active">
                <div class="section">
                    <div class="section-title">Log an Entry</div>
                    
                    <div class="date-picker-group">
                        <div class="date-shortcuts">
                            <button class="date-shortcut active" onclick="setDateToday()">Today</button>
                            <button class="date-shortcut" onclick="setDateYesterday()">Yesterday</button>
                            <button class="date-shortcut" onclick="toggleCustomDate()">Custom</button>
                        </div>
                        <div id="customDatePicker" style="display: none; margin-bottom: 8px;">
                            <input type="date" id="dateInput" class="date-input" onchange="setCustomDate()">
                        </div>
                        <div class="current-date-display" id="currentDateDisplay">Today</div>
                    </div>

                    <div class="time-inputs">
                        <div class="time-input-group">
                            <div class="time-input-label">From</div>
                            <input type="time" id="timeFrom" class="time-input">
                        </div>
                        <div class="time-input-group">
                            <div class="time-input-label">To</div>
                            <input type="time" id="timeTo" class="time-input">
                        </div>
                    </div>

                    <div class="log-section">
                        <div class="log-label">1. How are you feeling?</div>
                        <div class="energy-buttons" id="energyButtons"></div>
                    </div>

                    <div class="log-section">
                        <div class="log-label">2. What are you doing?</div>
                        <div class="activity-grid" id="activityGrid"></div>
                    </div>

                    <button class="log-button" onclick="logEntry()">Log Entry</button>
                </div>
            </div>

            <!-- MONTH TAB -->
            <div id="monthTab" class="view">
                <div class="section">
                    <div class="month-selector">
                        <span class="month-nav" onclick="previousMonth()">←</span>
                        <span id="monthDisplay" style="font-weight: 600; flex: 1; text-align: center;"></span>
                        <span class="month-nav" onclick="nextMonth()">→</span>
                    </div>
                    <div id="monthView" class="month-view"></div>
                </div>

                <div class="section" id="breakdownSection" style="display: none;">
                    <div class="section-title">Hours This Month</div>
                    <div class="hours-breakdown" id="hoursBreakdown"></div>
                </div>
            </div>

            <!-- ANALYSIS TAB -->
            <div id="analysisTab" class="view">
                <div id="analysisContent"></div>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settingsView" class="view">
            <button class="back-btn" onclick="showMain()">← Back</button>

            <div class="section">
                <div class="section-title">Energy Levels</div>
                <div id="energySettings"></div>
                <button class="add-btn" onclick="addEnergyLevel()">+ Add energy level</button>
            </div>

            <div class="section">
                <div class="section-title">Activities</div>
                <div id="activitySettings"></div>
                <button class="add-btn" onclick="addActivity()">+ Add activity</button>
            </div>

            <div class="section">
                <div class="section-title">Data</div>
                <button class="export-btn" onclick="exportData()">📥 Export data</button>
                <button class="export-btn danger-btn" onclick="clearAllData()">🗑️ Clear all</button>
                <div class="info-text">Data saved on your phone.</div>
            </div>
        </div>

        <!-- EDIT MODAL -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-title">Edit Entry</div>
                <div style="margin-bottom: 12px;">
                    <div class="time-input-label">From</div>
                    <input type="time" id="editTimeFrom" class="modal-input">
                </div>
                <div style="margin-bottom: 12px;">
                    <div class="time-input-label">To</div>
                    <input type="time" id="editTimeTo" class="modal-input">
                </div>
                <div class="modal-buttons">
                    <button class="modal-btn" onclick="closeEditModal()">Cancel</button>
                    <button class="modal-btn primary" onclick="saveEditedEntry()">Save</button>
                    <button class="modal-btn danger-btn" onclick="deleteEditingEntry()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultConfig = {
            energyLevels: [
                { id: 'high', label: '⚡ High energy' },
                { id: 'medium', label: '🌤️ Medium energy' },
                { id: 'low', label: '🌙 Low energy' },
                { id: 'struggling', label: '💙 Struggling' }
            ],
            activities: [
                { id: 'keyboard', label: '🎹', name: 'Keyboard' },
                { id: 'sewing', label: '✂️', name: 'Sewing' },
                { id: 'garden', label: '🌱', name: 'Garden' },
                { id: 'design', label: '🎨', name: 'Design' },
                { id: 'planning', label: '📋', name: 'Planning' },
                { id: 'move', label: '🚶', name: 'Movement' },
                { id: 'rest', label: '😴', name: 'Rest' }
            ]
        };

        let config = JSON.parse(JSON.stringify(defaultConfig));
        let log = {};
        let selectedDate = new Date();
        let selectedEnergy = null;
        let selectedActivity = null;
        let currentMonth = new Date();
        let editingEntry = null;

        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getMonthKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${year}-${month}`;
        }

        function formatDateDisplay(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (getDateKey(date) === getDateKey(today)) {
                return 'Today';
            } else if (getDateKey(date) === getDateKey(yesterday)) {
                return 'Yesterday';
            } else {
                return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            }
        }

        function formatFullDate(dateKey) {
            const [year, month, day] = dateKey.split('-');
            const date = new Date(`${year}-${month}-${day}T00:00:00`);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function formatMonthDisplay(date) {
            return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function calculateDuration(timeFrom, timeTo) {
            if (!timeFrom || !timeTo) return 0;
            const [fromHours, fromMins] = timeFrom.split(':').map(Number);
            const [toHours, toMins] = timeTo.split(':').map(Number);
            const fromTotalMins = fromHours * 60 + fromMins;
            const toTotalMins = toHours * 60 + toMins;
            let duration = toTotalMins - fromTotalMins;
            if (duration < 0) duration += 24 * 60;
            return duration / 60;
        }

        function formatHours(hours) {
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (h === 0) return `${m}m`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}m`;
        }

        function loadData() {
            const stored = localStorage.getItem('trackerConfig');
            if (stored) config = JSON.parse(stored);
            const logStored = localStorage.getItem('activityLog');
            if (logStored) log = JSON.parse(logStored);
        }

        function saveData() {
            localStorage.setItem('trackerConfig', JSON.stringify(config));
            localStorage.setItem('activityLog', JSON.stringify(log));
        }

        function switchTab(tab) {
            document.getElementById('logTab').classList.remove('active');
            document.getElementById('monthTab').classList.remove('active');
            document.getElementById('analysisTab').classList.remove('active');
            document.querySelectorAll('.header-btn').forEach(btn => btn.classList.remove('active'));

            if (tab === 'log') {
                document.getElementById('logTab').classList.add('active');
                document.querySelectorAll('.header-btn')[0].classList.add('active');
            } else if (tab === 'month') {
                document.getElementById('monthTab').classList.add('active');
                document.querySelectorAll('.header-btn')[1].classList.add('active');
                renderMonth();
            } else if (tab === 'analysis') {
                document.getElementById('analysisTab').classList.add('active');
                document.querySelectorAll('.header-btn')[2].classList.add('active');
                renderAnalysis();
            }
        }

        function setDateToday() {
            selectedDate = new Date();
            updateDateDisplay();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function setDateYesterday() {
            selectedDate = new Date();
            selectedDate.setDate(selectedDate.getDate() - 1);
            updateDateDisplay();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function toggleCustomDate() {
            const picker = document.getElementById('customDatePicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
            if (picker.style.display !== 'none') {
                document.getElementById('dateInput').value = getDateKey(selectedDate);
            }
        }

        function setCustomDate() {
            const dateString = document.getElementById('dateInput').value;
            if (dateString) {
                selectedDate = new Date(dateString + 'T00:00:00');
                updateDateDisplay();
                document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
                document.getElementById('customDatePicker').style.display = 'none';
            }
        }

        function updateDateDisplay() {
            document.getElementById('currentDateDisplay').textContent = formatDateDisplay(selectedDate);
        }

        function renderEnergyButtons() {
            const container = document.getElementById('energyButtons');
            container.innerHTML = '';
            
            config.energyLevels.forEach(level => {
                const btn = document.createElement('button');
                btn.className = 'energy-btn';
                if (selectedEnergy === level.id) {
                    btn.classList.add('active');
                }
                btn.textContent = level.label;
                btn.onclick = () => {
                    selectedEnergy = level.id;
                    renderEnergyButtons();
                };
                container.appendChild(btn);
            });
        }

        function renderActivityGrid() {
            const container = document.getElementById('activityGrid');
            container.innerHTML = '';

            config.activities.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'activity-btn';
                if (selectedActivity === act.id) {
                    btn.classList.add('active');
                }
                btn.innerHTML = `<div class="activity-icon">${act.label}</div><div class="activity-label">${act.name}</div>`;
                btn.onclick = () => {
                    selectedActivity = act.id;
                    renderActivityGrid();
                };
                container.appendChild(btn);
            });
        }

        function logEntry() {
            if (!selectedEnergy || !selectedActivity) {
                alert('Please select both energy level and activity');
                return;
            }

            const timeFrom = document.getElementById('timeFrom').value;
            const timeTo = document.getElementById('timeTo').value;

            if (!timeFrom || !timeTo) {
                alert('Please set both start and end time');
                return;
            }

            const dateKey = getDateKey(selectedDate);
            if (!log[dateKey]) {
                log[dateKey] = [];
            }

            log[dateKey].push({
                id: Date.now(),
                energy: selectedEnergy,
                activity: selectedActivity,
                timeFrom,
                timeTo
            });

            saveData();
            selectedEnergy = null;
            selectedActivity = null;
            document.getElementById('timeFrom').value = '';
            document.getElementById('timeTo').value = '';
            renderEnergyButtons();
            renderActivityGrid();
        }

        function previousMonth() {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            renderMonth();
        }

        function nextMonth() {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            renderMonth();
        }

        function renderMonth() {
            document.getElementById('monthDisplay').textContent = formatMonthDisplay(currentMonth);
            const monthKey = getMonthKey(currentMonth);
            const monthStart = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
            const monthEnd = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);

            const container = document.getElementById('monthView');
            container.innerHTML = '';

            const allEntries = {};
            Object.keys(log).forEach(dateKey => {
                const [year, month, day] = dateKey.split('-');
                const date = new Date(`${year}-${month}-${day}T00:00:00`);
                if (date >= monthStart && date <= monthEnd) {
                    allEntries[dateKey] = log[dateKey];
                }
            });

            const sortedDates = Object.keys(allEntries).sort().reverse();

            if (sortedDates.length === 0) {
                container.innerHTML = '<div class="empty-state">No entries this month</div>';
                document.getElementById('breakdownSection').style.display = 'none';
                return;
            }

            sortedDates.forEach(dateKey => {
                const entries = allEntries[dateKey];
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';

                const dateDiv = document.createElement('div');
                dateDiv.className = 'day-card-date';
                dateDiv.textContent = formatFullDate(dateKey);
                dayCard.appendChild(dateDiv);

                const entriesDiv = document.createElement('div');
                entriesDiv.className = 'day-entries';

                entries.forEach(entry => {
                    const energyLabel = config.energyLevels.find(e => e.id === entry.energy)?.label || '?';
                    const activityLabel = config.activities.find(a => a.id === entry.activity)?.name || '?';
                    const activityIcon = config.activities.find(a => a.id === entry.activity)?.label || '';
                    const duration = calculateDuration(entry.timeFrom, entry.timeTo);

                    const entryDiv = document.createElement('div');
                    entryDiv.className = 'entry';

                    const detailsDiv = document.createElement('div');
                    detailsDiv.className = 'entry-details';

                    const activitySpan = document.createElement('div');
                    activitySpan.className = 'entry-activity';
                    activitySpan.textContent = `${activityIcon} ${activityLabel}`;

                    const timeSpan = document.createElement('div');
                    timeSpan.className = 'entry-time';
                    timeSpan.textContent = `${entry.timeFrom} → ${entry.timeTo}`;
                    timeSpan.style.cursor = 'pointer';
                    timeSpan.style.textDecoration = 'underline';
                    timeSpan.onclick = () => editEntry(dateKey, entry);

                    const durationSpan = document.createElement('div');
                    durationSpan.className = 'entry-duration';
                    durationSpan.textContent = `${formatHours(duration)}`;

                    const energySpan = document.createElement('div');
                    energySpan.className = 'entry-energy';
                    energySpan.textContent = energyLabel;

                    detailsDiv.appendChild(activitySpan);
                    detailsDiv.appendChild(timeSpan);
                    detailsDiv.appendChild(durationSpan);
                    detailsDiv.appendChild(energySpan);

                    entryDiv.appendChild(detailsDiv);
                    entriesDiv.appendChild(entryDiv);
                });

                dayCard.appendChild(entriesDiv);
                container.appendChild(dayCard);
            });

            renderHoursBreakdown(sortedDates);
        }

        function renderHoursBreakdown(dates) {
            const hoursByActivity = {};
            config.activities.forEach(act => {
                hoursByActivity[act.id] = 0;
            });

            dates.forEach(dateKey => {
                log[dateKey].forEach(entry => {
                    const duration = calculateDuration(entry.timeFrom, entry.timeTo);
                    hoursByActivity[entry.activity] += duration;
                });
            });

            const container = document.getElementById('hoursBreakdown');
            container.innerHTML = '';

            const sortedActivities = config.activities.sort((a, b) => hoursByActivity[b.id] - hoursByActivity[a.id]);

            sortedActivities.forEach(act => {
                const hours = hoursByActivity[act.id];
                if (hours > 0) {
                    const item = document.createElement('div');
                    item.className = 'hours-item';
                    item.innerHTML = `
                        <span class="hours-label">${act.label} ${act.name}</span>
                        <span class="hours-value">${formatHours(hours)}</span>
                    `;
                    container.appendChild(item);
                }
            });

            if (dates.length > 0) {
                document.getElementById('breakdownSection').style.display = 'block';
            }
        }

        function renderAnalysis() {
            const container = document.getElementById('analysisContent');
            container.innerHTML = '';

            // Get all entries
            let allEntries = [];
            Object.values(log).forEach(day => {
                day.forEach(entry => {
                    allEntries.push(entry);
                });
            });

            if (allEntries.length === 0) {
                container.innerHTML = '<div class="section"><div class="empty-state">No data yet. Start logging to see analysis!</div></div>';
                return;
            }

            // 1. Energy Patterns
            const energyCounts = {};
            config.energyLevels.forEach(e => energyCounts[e.id] = 0);
            allEntries.forEach(e => energyCounts[e.energy]++);

            let energyHtml = '<div class="section"><div class="section-title">Energy Patterns</div><div class="analysis-grid">';
            config.energyLevels.forEach(e => {
                const count = energyCounts[e.id];
                const percent = Math.round((count / allEntries.length) * 100);
                energyHtml += `<div class="analysis-card"><div class="analysis-title">${e.label}</div><div class="analysis-item"><span class="analysis-label">Times logged</span><span class="analysis-value">${count} (${percent}%)</span></div></div>`;
            });
            energyHtml += '</div></div>';

            // 2. Best Activity Times
            const timeOfDay = {};
            config.activities.forEach(a => {
                timeOfDay[a.id] = { morning: 0, afternoon: 0, evening: 0 };
            });
            allEntries.forEach(e => {
                const [hours] = e.timeFrom.split(':').map(Number);
                let period = 'morning';
                if (hours >= 12 && hours < 18) period = 'afternoon';
                if (hours >= 18) period = 'evening';
                timeOfDay[e.activity][period]++;
            });

            let timeHtml = '<div class="section"><div class="section-title">Best Activity Times</div><div class="analysis-grid">';
            config.activities.forEach(a => {
                const times = timeOfDay[a.id];
                const total = times.morning + times.afternoon + times.evening;
                if (total > 0) {
                    const best = Math.max(times.morning, times.afternoon, times.evening);
                    let bestTime = 'Morning';
                    if (best === times.afternoon) bestTime = 'Afternoon';
                    if (best === times.evening) bestTime = 'Evening';
                    timeHtml += `<div class="analysis-card"><div class="analysis-title">${a.label} ${a.name}</div><div class="analysis-item"><span class="analysis-label">Best time</span><span class="analysis-value">${bestTime}</span></div></div>`;
                }
            });
            timeHtml += '</div></div>';

            // 5. Energy vs Activity
            const energyActivityPairs = {};
            config.activities.forEach(a => {
                energyActivityPairs[a.id] = {};
                config.energyLevels.forEach(e => {
                    energyActivityPairs[a.id][e.id] = 0;
                });
            });
            allEntries.forEach(e => {
                energyActivityPairs[e.activity][e.energy]++;
            });

            let correlationHtml = '<div class="section"><div class="section-title">Energy vs Activity</div><div class="analysis-grid">';
            config.activities.forEach(a => {
                const pairs = energyActivityPairs[a.id];
                const total = Object.values(pairs).reduce((s, v) => s + v, 0);
                if (total > 0) {
                    const highCount = pairs.high || 0;
                    const highPercent = Math.round((highCount / total) * 100);
                    correlationHtml += `<div class="analysis-card"><div class="analysis-title">${a.label} ${a.name}</div><div class="analysis-item"><span class="analysis-label">High energy %</span><span class="analysis-value">${highPercent}%</span></div></div>`;
                }
            });
            correlationHtml += '</div></div>';

            // 7. Most Productive Days
            const dayEntries = {};
            Object.keys(log).forEach(dateKey => {
                dayEntries[dateKey] = log[dateKey].length;
            });
            const sortedByProductivity = Object.entries(dayEntries).sort((a, b) => b[1] - a[1]).slice(0, 7);

            let dayHtml = '<div class="section"><div class="section-title">Most Productive Days</div><div class="analysis-grid">';
            sortedByProductivity.forEach(([dateKey, count]) => {
                const date = new Date(dateKey + 'T00:00:00');
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                dayHtml += `<div class="analysis-card"><div class="analysis-title">${dayName}</div><div class="analysis-item"><span class="analysis-label">Entries</span><span class="analysis-value">${count}</span></div></div>`;
            });
            dayHtml += '</div></div>';

            container.innerHTML = energyHtml + timeHtml + correlationHtml + dayHtml;
        }

        function editEntry(dateKey, entry) {
            editingEntry = { dateKey, entry };
            document.getElementById('editTimeFrom').value = entry.timeFrom;
            document.getElementById('editTimeTo').value = entry.timeTo;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingEntry = null;
        }

        function saveEditedEntry() {
            if (!editingEntry) return;
            const timeFrom = document.getElementById('editTimeFrom').value;
            const timeTo = document.getElementById('editTimeTo').value;
            if (!timeFrom || !timeTo) return;

            editingEntry.entry.timeFrom = timeFrom;
            editingEntry.entry.timeTo = timeTo;
            saveData();
            renderMonth();
            closeEditModal();
        }

        function deleteEditingEntry() {
            if (!editingEntry) return;
            const idx = log[editingEntry.dateKey].findIndex(e => e.id === editingEntry.entry.id);
            if (idx !== -1) {
                log[editingEntry.dateKey].splice(idx, 1);
                saveData();
                renderMonth();
                closeEditModal();
            }
        }

        function showSettings() {
            document.getElementById('mainView').classList.remove('active');
            document.getElementById('settingsView').classList.add('active');
            renderSettings();
        }

        function showMain() {
            document.getElementById('settingsView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
        }

        function renderSettings() {
            const energyContainer = document.getElementById('energySettings');
            energyContainer.innerHTML = '';
            config.energyLevels.forEach((level, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${level.label}" onchange="config.energyLevels[${idx}].label = this.value; saveData();">
                    <button onclick="config.energyLevels.splice(${idx}, 1); saveData(); renderSettings(); renderEnergyButtons();">Remove</button>
                `;
                energyContainer.appendChild(item);
            });

            const actContainer = document.getElementById('activitySettings');
            actContainer.innerHTML = '';
            config.activities.forEach((act, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${act.label} ${act.name}" onchange="const parts = this.value.split(' '); config.activities[${idx}].label = parts[0]; config.activities[${idx}].name = parts.slice(1).join(' '); saveData();">
                    <button onclick="config.activities.splice(${idx}, 1); saveData(); renderSettings(); renderActivityGrid();">Remove</button>
                `;
                actContainer.appendChild(item);
            });
        }

        function addEnergyLevel() {
            const name = prompt('Energy level (e.g., "😊 Energized"):');
            if (name) {
                config.energyLevels.push({
                    id: 'custom_' + Date.now(),
                    label: name
                });
                saveData();
                renderSettings();
                renderEnergyButtons();
            }
        }

        function addActivity() {
            const input = prompt('Activity (e.g., "🎸 Guitar"):');
            if (input) {
                const parts = input.split(' ');
                config.activities.push({
                    id: 'custom_' + Date.now(),
                    label: parts[0],
                    name: parts.slice(1).join(' ') || 'Activity'
                });
                saveData();
                renderSettings();
                renderActivityGrid();
            }
        }

        function exportData() {
            const backup = { config, log, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tracker_backup.json';
            a.click();
        }

        function clearAllData() {
            if (confirm('Delete ALL data? This cannot be undone.')) {
                log = {};
                config = JSON.parse(JSON.stringify(defaultConfig));
                saveData();
                renderEnergyButtons();
                renderActivityGrid();
                showMain();
            }
        }

        loadData();
        updateDateDisplay();
        renderEnergyButtons();
        renderActivityGrid();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.oninstall=()=>self.skipWaiting();self.onactivate=()=>clients.claim();');
        }
    </script>
</body>
</html>
