<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Tracker">
    <title>Daily Activity Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:active {
            background: #f5f5f5;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .date-picker-group {
            margin-bottom: 12px;
        }

        .date-shortcuts {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .date-shortcut {
            flex: 1;
            padding: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .date-shortcut:active {
            background: #f5f5f5;
        }

        .date-shortcut.active {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .date-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .current-date-display {
            font-size: 13px;
            color: #666;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            text-align: center;
        }

        .log-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .log-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .energy-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .energy-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .energy-btn:active {
            transform: scale(0.95);
        }

        .energy-btn.active {
            border-color: #534AB7;
            background: #534AB7;
            color: white;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 8px;
        }

        .activity-btn {
            padding: 10px 6px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .activity-btn:active {
            transform: scale(0.95);
        }

        .activity-btn.active {
            border-color: #3B6D11;
            background: #EAF3DE;
            color: #1a1a1a;
            font-weight: 600;
        }

        .activity-icon {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .activity-label {
            font-size: 10px;
        }

        .log-button {
            width: 100%;
            padding: 12px;
            background: #534AB7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .log-button:active {
            background: #3d3178;
        }

        .log-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .recent-days {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
        }

        .day-card-date {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .day-entries {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entry {
            background: white;
            border-left: 3px solid #534AB7;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .entry-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .entry-activity {
            font-weight: 600;
        }

        .entry-energy {
            font-size: 10px;
            color: #999;
        }

        .entry-time {
            font-size: 10px;
            color: #999;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 13px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .back-btn {
            padding: 10px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            width: 100%;
            font-weight: 500;
        }

        .back-btn:active {
            background: #f5f5f5;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .settings-item input {
            flex: 1;
            border: 1px solid #e0e0e0;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 8px;
        }

        .settings-item button {
            padding: 6px 12px;
            background: #fcebeb;
            border: 1px solid #f09595;
            color: #501313;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .settings-item button:active {
            background: #f7c1c1;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .add-btn:active {
            background: #f5f5f5;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .export-btn:active {
            background: #f5f5f5;
        }

        .danger-btn {
            background: #fcebeb;
            border-color: #f09595;
            color: #501313;
        }

        .danger-btn:active {
            background: #f7c1c1;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-btn:active {
            background: #f5f5f5;
        }

        .modal-btn.primary {
            background: #534AB7;
            color: white;
            border-color: #534AB7;
        }

        .delete-btn {
            background: #fcebeb;
            border: 0.5px solid #f09595;
            color: #501313;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #ffffff;
            }
            .section, .header-btn, .add-btn, .export-btn, .modal-content, .day-card, .entry, .log-section {
                background: #2a2a2a;
                border-color: #444;
            }
            .settings-item, .modal-btn, .current-date-display, .date-shortcut {
                background: #333;
                border-color: #444;
            }
            .date-shortcut, .modal-btn {
                color: #fff;
            }
            .section-title, .info-text, .log-label {
                color: #aaa;
            }
            .activity-btn {
                background: #2a2a2a;
                color: #fff;
                border-color: #444;
            }
            .activity-btn.active {
                background: #3B6D11;
                border-color: #3B6D11;
                color: #fff;
            }
            .settings-item input, .date-input, .modal-input {
                background: #3a3a3a;
                color: #fff;
                border-color: #444;
            }
            .empty-state {
                color: #666;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MAIN VIEW -->
        <div id="mainView" class="view active">
            <div class="header">
                <h1>Daily Tracker</h1>
                <button class="header-btn" onclick="showSettings()">⚙️ Settings</button>
            </div>

            <!-- LOG SECTION -->
            <div class="section">
                <div class="section-title">Log an Entry</div>
                
                <div class="date-picker-group">
                    <div class="date-shortcuts">
                        <button class="date-shortcut active" onclick="setDateToday()">Today</button>
                        <button class="date-shortcut" onclick="setDateYesterday()">Yesterday</button>
                        <button class="date-shortcut" onclick="toggleCustomDate()">Custom</button>
                    </div>
                    <div id="customDatePicker" style="display: none; margin-bottom: 8px;">
                        <input type="date" id="dateInput" class="date-input" onchange="setCustomDate()">
                    </div>
                    <div class="current-date-display" id="currentDateDisplay">Today</div>
                </div>

                <div class="log-section">
                    <div class="log-label">1. How are you feeling right now?</div>
                    <div class="energy-buttons" id="energyButtons"></div>
                </div>

                <div class="log-section">
                    <div class="log-label">2. What are you doing?</div>
                    <div class="activity-grid" id="activityGrid"></div>
                </div>

                <button class="log-button" onclick="logEntry()" id="logBtn">Log Entry</button>
            </div>

            <!-- RECENT DAYS SECTION -->
            <div class="section">
                <div class="section-title">Last 7 Days</div>
                <div class="recent-days" id="recentDays"></div>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settingsView" class="view">
            <button class="back-btn" onclick="showMain()">← Back</button>

            <div class="section">
                <div class="section-title">Energy Levels</div>
                <div id="energySettings"></div>
                <button class="add-btn" onclick="addEnergyLevel()">+ Add energy level</button>
            </div>

            <div class="section">
                <div class="section-title">Activities</div>
                <div id="activitySettings"></div>
                <button class="add-btn" onclick="addActivity()">+ Add activity</button>
            </div>

            <div class="section">
                <div class="section-title">Data</div>
                <button class="export-btn" onclick="exportData()">📥 Export data</button>
                <button class="export-btn danger-btn" onclick="clearAllData()">🗑️ Clear all</button>
                <div class="info-text">Data saved on your phone.</div>
            </div>
        </div>

        <!-- EDIT TIME MODAL -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-title">Edit Time</div>
                <input type="time" id="timeInput" class="modal-input">
                <div class="modal-buttons">
                    <button class="modal-btn" onclick="closeEditModal()">Cancel</button>
                    <button class="modal-btn primary" onclick="saveEditedTime()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultConfig = {
            energyLevels: [
                { id: 'high', label: '⚡ High energy' },
                { id: 'medium', label: '🌤️ Medium energy' },
                { id: 'low', label: '🌙 Low energy' },
                { id: 'struggling', label: '💙 Struggling' }
            ],
            activities: [
                { id: 'keyboard', label: '🎹', name: 'Keyboard' },
                { id: 'sewing', label: '✂️', name: 'Sewing' },
                { id: 'garden', label: '🌱', name: 'Garden' },
                { id: 'design', label: '🎨', name: 'Design' },
                { id: 'planning', label: '📋', name: 'Planning' },
                { id: 'move', label: '🚶', name: 'Movement' },
                { id: 'rest', label: '😴', name: 'Rest' }
            ]
        };

        let config = JSON.parse(JSON.stringify(defaultConfig));
        let log = {};
        let selectedDate = new Date();
        let selectedEnergy = null;
        let selectedActivity = null;
        let editingEntry = null;

        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateDisplay(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (getDateKey(date) === getDateKey(today)) {
                return 'Today';
            } else if (getDateKey(date) === getDateKey(yesterday)) {
                return 'Yesterday';
            } else {
                return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            }
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function formatFullDate(dateKey) {
            const [year, month, day] = dateKey.split('-');
            const date = new Date(`${year}-${month}-${day}T00:00:00`);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function loadData() {
            const stored = localStorage.getItem('trackerConfig');
            if (stored) config = JSON.parse(stored);
            const logStored = localStorage.getItem('activityLog');
            if (logStored) log = JSON.parse(logStored);
        }

        function saveData() {
            localStorage.setItem('trackerConfig', JSON.stringify(config));
            localStorage.setItem('activityLog', JSON.stringify(log));
        }

        function setDateToday() {
            selectedDate = new Date();
            updateDateDisplay();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function setDateYesterday() {
            selectedDate = new Date();
            selectedDate.setDate(selectedDate.getDate() - 1);
            updateDateDisplay();
            document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customDatePicker').style.display = 'none';
        }

        function toggleCustomDate() {
            const picker = document.getElementById('customDatePicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
            if (picker.style.display !== 'none') {
                document.getElementById('dateInput').value = getDateKey(selectedDate);
            }
        }

        function setCustomDate() {
            const dateString = document.getElementById('dateInput').value;
            if (dateString) {
                selectedDate = new Date(dateString + 'T00:00:00');
                updateDateDisplay();
                document.querySelectorAll('.date-shortcut').forEach(btn => btn.classList.remove('active'));
                document.getElementById('customDatePicker').style.display = 'none';
            }
        }

        function updateDateDisplay() {
            document.getElementById('currentDateDisplay').textContent = formatDateDisplay(selectedDate);
        }

        function renderEnergyButtons() {
            const container = document.getElementById('energyButtons');
            container.innerHTML = '';
            
            config.energyLevels.forEach(level => {
                const btn = document.createElement('button');
                btn.className = 'energy-btn';
                if (selectedEnergy === level.id) {
                    btn.classList.add('active');
                }
                btn.textContent = level.label;
                btn.onclick = () => {
                    selectedEnergy = level.id;
                    renderEnergyButtons();
                };
                container.appendChild(btn);
            });
        }

        function renderActivityGrid() {
            const container = document.getElementById('activityGrid');
            container.innerHTML = '';

            config.activities.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'activity-btn';
                if (selectedActivity === act.id) {
                    btn.classList.add('active');
                }
                btn.innerHTML = `<div class="activity-icon">${act.label}</div><div class="activity-label">${act.name}</div>`;
                btn.onclick = () => {
                    selectedActivity = act.id;
                    renderActivityGrid();
                };
                container.appendChild(btn);
            });
        }

        function logEntry() {
            if (!selectedEnergy || !selectedActivity) {
                alert('Please select both energy level and activity');
                return;
            }

            const dateKey = getDateKey(selectedDate);
            if (!log[dateKey]) {
                log[dateKey] = [];
            }

            log[dateKey].push({
                id: Date.now(),
                energy: selectedEnergy,
                activity: selectedActivity,
                timestamp: new Date()
            });

            saveData();
            selectedEnergy = null;
            selectedActivity = null;
            renderEnergyButtons();
            renderActivityGrid();
            renderRecentDays();
        }

        function deleteEntry(dateKey, entryId) {
            if (confirm('Delete this entry?')) {
                const idx = log[dateKey].findIndex(e => e.id === entryId);
                if (idx !== -1) {
                    log[dateKey].splice(idx, 1);
                    saveData();
                    renderRecentDays();
                }
            }
        }

        function editEntryTime(dateKey, entryId) {
            editingEntry = { dateKey, entryId };
            const entry = log[dateKey].find(e => e.id === entryId);
            if (entry) {
                const time = new Date(entry.timestamp);
                const hours = String(time.getHours()).padStart(2, '0');
                const minutes = String(time.getMinutes()).padStart(2, '0');
                document.getElementById('timeInput').value = `${hours}:${minutes}`;
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingEntry = null;
        }

        function saveEditedTime() {
            if (!editingEntry) return;
            const timeString = document.getElementById('timeInput').value;
            if (!timeString) return;

            const [hours, minutes] = timeString.split(':');
            const entry = log[editingEntry.dateKey].find(e => e.id === editingEntry.entryId);
            if (entry) {
                const date = new Date(entry.timestamp);
                date.setHours(parseInt(hours), parseInt(minutes), 0);
                entry.timestamp = date;
                saveData();
                renderRecentDays();
                closeEditModal();
            }
        }

        function renderRecentDays() {
            const container = document.getElementById('recentDays');
            container.innerHTML = '';

            const sortedDates = Object.keys(log).sort().reverse().slice(0, 7);

            if (sortedDates.length === 0) {
                container.innerHTML = '<div class="empty-state">No entries yet. Start logging to see your progress!</div>';
                return;
            }

            sortedDates.forEach(dateKey => {
                const entries = log[dateKey];
                if (!entries || entries.length === 0) return;

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';

                const dateDiv = document.createElement('div');
                dateDiv.className = 'day-card-date';
                dateDiv.textContent = formatFullDate(dateKey);
                dayCard.appendChild(dateDiv);

                const entriesDiv = document.createElement('div');
                entriesDiv.className = 'day-entries';

                entries.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)).forEach(entry => {
                    const energyLabel = config.energyLevels.find(e => e.id === entry.energy)?.label || '?';
                    const activityLabel = config.activities.find(a => a.id === entry.activity)?.name || '?';
                    const activityIcon = config.activities.find(a => a.id === entry.activity)?.label || '';
                    const time = formatTime(new Date(entry.timestamp));

                    const entryDiv = document.createElement('div');
                    entryDiv.className = 'entry';

                    const detailsDiv = document.createElement('div');
                    detailsDiv.className = 'entry-details';

                    const activitySpan = document.createElement('div');
                    activitySpan.className = 'entry-activity';
                    activitySpan.textContent = `${activityIcon} ${activityLabel}`;

                    const energySpan = document.createElement('div');
                    energySpan.className = 'entry-energy';
                    energySpan.textContent = energyLabel;

                    detailsDiv.appendChild(activitySpan);
                    detailsDiv.appendChild(energySpan);

                    const timeDiv = document.createElement('div');
                    timeDiv.style.display = 'flex';
                    timeDiv.style.flexDirection = 'column';
                    timeDiv.style.alignItems = 'flex-end';
                    timeDiv.style.gap = '8px';

                    const timeSpan = document.createElement('div');
                    timeSpan.className = 'entry-time';
                    timeSpan.textContent = time;
                    timeSpan.style.cursor = 'pointer';
                    timeSpan.style.textDecoration = 'underline';
                    timeSpan.onclick = () => editEntryTime(dateKey, entry.id);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = '✕';
                    deleteBtn.onclick = () => deleteEntry(dateKey, entry.id);

                    timeDiv.appendChild(timeSpan);
                    timeDiv.appendChild(deleteBtn);

                    entryDiv.appendChild(detailsDiv);
                    entryDiv.appendChild(timeDiv);

                    entriesDiv.appendChild(entryDiv);
                });

                dayCard.appendChild(entriesDiv);
                container.appendChild(dayCard);
            });
        }

        function showSettings() {
            document.getElementById('mainView').classList.remove('active');
            document.getElementById('settingsView').classList.add('active');
            renderSettings();
        }

        function showMain() {
            document.getElementById('settingsView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
        }

        function renderSettings() {
            const energyContainer = document.getElementById('energySettings');
            energyContainer.innerHTML = '';
            config.energyLevels.forEach((level, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${level.label}" onchange="config.energyLevels[${idx}].label = this.value; saveData();">
                    <button onclick="config.energyLevels.splice(${idx}, 1); saveData(); renderSettings(); renderEnergyButtons();">Remove</button>
                `;
                energyContainer.appendChild(item);
            });

            const actContainer = document.getElementById('activitySettings');
            actContainer.innerHTML = '';
            config.activities.forEach((act, idx) => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <input type="text" value="${act.label} ${act.name}" onchange="const parts = this.value.split(' '); config.activities[${idx}].label = parts[0]; config.activities[${idx}].name = parts.slice(1).join(' '); saveData();">
                    <button onclick="config.activities.splice(${idx}, 1); saveData(); renderSettings(); renderActivityGrid();">Remove</button>
                `;
                actContainer.appendChild(item);
            });
        }

        function addEnergyLevel() {
            const name = prompt('Energy level (e.g., "😊 Energized"):');
            if (name) {
                config.energyLevels.push({
                    id: 'custom_' + Date.now(),
                    label: name
                });
                saveData();
                renderSettings();
                renderEnergyButtons();
            }
        }

        function addActivity() {
            const input = prompt('Activity (e.g., "🎸 Guitar"):');
            if (input) {
                const parts = input.split(' ');
                config.activities.push({
                    id: 'custom_' + Date.time(),
                    label: parts[0],
                    name: parts.slice(1).join(' ') || 'Activity'
                });
                saveData();
                renderSettings();
                renderActivityGrid();
            }
        }

        function exportData() {
            const backup = { config, log, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tracker_backup.json';
            a.click();
        }

        function clearAllData() {
            if (confirm('Delete ALL data? This cannot be undone.')) {
                log = {};
                config = JSON.parse(JSON.stringify(defaultConfig));
                saveData();
                renderEnergyButtons();
                renderActivityGrid();
                renderRecentDays();
                showMain();
            }
        }

        loadData();
        updateDateDisplay();
        renderEnergyButtons();
        renderActivityGrid();
        renderRecentDays();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.oninstall=()=>self.skipWaiting();self.onactivate=()=>clients.claim();');
        }
    </script>
</body>
</html>
